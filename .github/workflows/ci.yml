name: CI

on: [push, pull_request]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        working-directory: rust
        run: cargo test --workspace
      - name: types in sync
        run: ./scripts/check-generated-types.sh
